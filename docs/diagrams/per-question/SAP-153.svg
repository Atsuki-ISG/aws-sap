><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe center; width: 138px; height: 1px; padding-top: 168px; margin-left: 191px;"><div style="box-sizing: border-box; font-size: 0; text-align: center; color: #232F3E; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#232F3E, #bdc7d4); line-height: 1.2; pointer-events: all; font-weight: bold; white-space: normal; word-wrap: normal; ">移動対象アカウント</div></div></div></foreignObject><text x="260" y="171" fill="#232F3E" font-family="Helvetica" font-size="10px" text-anchor="middle" font-weight="bold">移動対象アカウント</text></switch></g></g></g><g data-cell-id="step1"><g transform="translate(0.5,0.5)"><rect x="50" y="200" width="390" height="120" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 388px; height: 1px; padding-top: 260px; margin-left: 52px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; color: #DD344C; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#DD344C, #ff7f93); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; ">① 移行元で RemoveAccountFromOrganization<br />  ・前提: 該当アカウントが "招待で参加" した<br />    アカウントのみ可能<br />  ・Organizations で作成したアカウントは<br />    事前に Standalone 化が必要</div></div></div></foreignObject><text x="52" y="263" fill="#DD344C" font-family="Helvetica" font-size="10px">① 移行元で RemoveAccountFromOrganization...</text></switch></g></g></g><g data-cell-id="step1b"><g transform="translate(0.5,0.5)"><rect x="50" y="330" width="390" height="170" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 388px; height: 1px; padding-top: 415px; margin-left: 52px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; color: #232F3E; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#232F3E, #bdc7d4); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; ">注意事項:<br />・支払方法がアカウントに設定されているか確認<br />  (なければ一時的に課金が止まる)<br />・RemoveAccountFromOrganization は<br />  管理アカウントからのみ実行可<br />・連結請求アカウントから外れ、<br />  ボリューム割引等は受けられなくなる</div></div></div></foreignObject><text x="52" y="418" fill="#232F3E" font-family="Helvetica" font-size="10px">注意事項:...</text></switch></g></g></g><g data-cell-id="dst"><g><rect x="490" y="50" width="480" height="480" rx="72" ry="72" fill="#f0f8e8" stroke="#7aa116" stroke-width="2" pointer-events="all" style="fill: light-dark(rgb(240, 248, 232), rgb(22, 29, 15)); stroke: light-dark(rgb(122, 161, 22), rgb(97, 130, 11));"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe flex-start; justify-content: unsafe center; width: 478px; height: 1px; padding-top: 63px; margin-left: 491px;"><div style="box-sizing: border-box; font-size: 0; text-align: center; color: #232F3E; "><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: light-dark(#232F3E, #bdc7d4); line-height: 1.2; pointer-events: all; font-weight: bold; white-space: normal; word-wrap: normal; ">移行先 Organization</div></div></div></foreignObject><text x="730" y="75" fill="#232F3E" font-family="Helvetica" font-size="12px" text-anchor="middle" font-weight="bold">移行先 Organization</text></switch></g></g></g><g data-cell-id="dstorg"><g transform="translate(0.5,0.5)"><path d="M 530 100 L 580 100 L 580 150 L 530 150 Z" fill="#7aa116" stroke="none" pointer-events="all" style="fill: light-dark(rgb(122, 161, 22), rgb(97, 130, 11));"/><path d="M 566.99 143.4 L 566.99 137.01 L 573.38 137.01 L 573.38 143.4 Z M 551.8 143.4 L 551.8 137.01 L 558.2 137.01 L 558.2 143.4 Z M 536.62 143.4 L 536.62 137.01 L 543.01 137.01 L 543.01 143.4 Z M 574.18 135.41 L 570.99 135.41 L 570.99 131.41 C 570.99 130.97 570.63 130.61 570.19 130.61 L 555.8 130.61 L 555.8 128.22 L 554.2 128.22 L 554.2 130.61 L 539.81 130.61 C 539.37 130.61 539.01 130.97 539.01 131.41 L 539.01 135.41 L 535.82 135.41 C 535.38 135.41 535.02 135.77 535.02 136.21 L 535.02 144.2 C 535.02 144.64 535.38 145 535.82 145 L 543.81 145 C 544.25 145 544.61 144.64 544.61 144.2 L 544.61 136.21 C 544.61 135.77 544.25 135.41 543.81 135.41 L 540.61 135.41 L 540.61 132.21 L 554.2 132.21 L 554.2 135.41 L 551 135.41 C 550.56 135.41 550.2 135.77 550.2 136.21 L 550.2 144.2 C 550.2 144.64 550.56 145 551 145 L 559 145 C 559.44 145 559.8 144.64 559.8 144.2 L 559.8 136.21 C 559.8 135.77 559.44 135.41 559 135.41 L 555.8 135.41 L 555.8 132.21 L 569.39 132.21 L 569.39 135.41 L 566.19 135.41 C 565.75 135.41 565.39 135.77 565.39 136.21 L 565.39 144.2 C 565.39 144.64 565.75 145 566.19 145 L 574.18 145 C 574.62 145 574.98 144.64 574.98 144.2 L 574.98 136.21 C 574.98 135.77 574.62 135.41 574.18 135.41 Z M 555 106.76 L 562.19 110.91 L 555 115.06 L 547.81 110.91 Z M 555.8 124.76 L 555.8 116.45 L 562.99 112.3 L 562.99 120.6 Z M 547.01 112.3 L 554.2 116.45 L 554.2 124.76 L 547.01 120.6 Z M 545.81 121.76 L 554.6 126.83 C 554.72 126.9 554.86 126.94 555 126.94 C 555.14 126.94 555.28 126.9 555.4 126.83 L 564.19 121.76 C 564.44 121.61 564.59 121.35 564.59 121.06 L 564.59 110.91 C 564.59 110.63 564.44 110.36 564.19 110.22 L 555.4 105.14 C 555.15 105 554.85 105 554.6 105.14 L 545.81 110.22 C 545.56 110.36 545.41 110.63 545.41 110.91 L 545.41 121.06 C 545.41 121.35 545.56 121.61 545.81 121.76 Z" fill="#ffffff" stroke="none" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18));"/></g></g><g data-cell-id="dst_l"><g transform="translate(0.5,0.5)"><rect x="500" y="158" width="130" height="20" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe center; width: 128px; height: 1px; padding-top: 168px; margin-left: 501px;"><div style="box-sizing: border-box; font-size: 0; text-align: center; color: #232F3E; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#232F3E, #bdc7d4); line-height: 1.2; pointer-events: all; font-weight: bold; white-space: normal; word-wrap: normal; ">移行先 Organizations</div></div></div></foreignObject><text x="565" y="171" fill="#232F3E" font-family="Helvetica" font-size="10px" text-anchor="middle" font-weight="bold">移行先 Organizations</text></switch></g></g></g><g data-cell-id="step2"><g transform="translate(0.5,0.5)"><rect x="510" y="200" width="450" height="140" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 448px; height: 1px; padding-top: 270px; margin-left: 512px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; color: #7AA116; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#7AA116, #61820b); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; ">② 移行先の管理アカウントから Invite 送信<br />  ・対象アカウントのメール/アカウントID を指定<br />  ・target 側で招待を Accept<br />  ・(標準で 15 日間有効)</div></div></div></foreignObject><text x="512" y="273" fill="#7AA116" font-family="Helvetica" font-size="10px">② 移行先の管理アカウントから Invite 送信...</text></switch></g></g></g><g data-cell-id="step3"><g transform="translate(0.5,0.5)"><rect x="510" y="350" width="450" height="170" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 448px; height: 1px; padding-top: 435px; margin-left: 512px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; color: #232F3E; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#232F3E, #bdc7d4); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; ">③ 受信側で AcceptHandshake を実行<br />  ・AWS Organizations コンソールで承認<br />  ・Accept すると即座に移行先 Organization へ<br />  ・その後 OU 配置 / SCP 付与を行う<br /><br />順序: ① Remove → ② Invite → ③ Accept<br />   (Remove を先にしないと新組織へ入れない)</div></div></div></foreignObject><text x="512" y="438" fill="#232F3E" font-family="Helvetica" font-size="10px">③ 受信側で AcceptHandshake を実行...</text></switch></g></g></g><g data-cell-id="r1"><g><path d="M 270 125 L 521.76 125" fill="none" stroke="#3b48cc" stroke-width="2" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(59, 72, 204), rgb(152, 163, 255));"/><path d="M 527.76 125 L 519.76 129 L 521.76 125 L 519.76 121 Z" fill="#3b48cc" stroke="#3b48cc" stroke-width="2" stroke-miterlimit="10" pointer-events="all" style="fill: light-dark(rgb(59, 72, 204), rgb(152, 163, 255)); stroke: light-dark(rgb(59, 72, 204), rgb(152, 163, 255));"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe center; width: 1px; height: 1px; padding-top: 125px; margin-left: 400px;"><div style="box-sizing: border-box; font-size: 0; text-align: center; color: #3B48CC; background-color: #ffffff; "><div style="display: inline-block; font-size: 10px; font-family: Helvetica; color: light-dark(#3B48CC, #98a3ff); line-height: 1.2; pointer-events: all; background-color: light-dark(#ffffff, var(--ge-dark-color, #121212)); white-space: nowrap; ">移管フロー</div></div></div></foreignObject><text x="400" y="128" fill="#3B48CC" font-family="Helvetica" font-size="10px" text-anchor="middle">移管フロー</text></switch></g></g></g></g></g></g><switch><g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/><a transform="translate(0,-5)" xlink:href="https://www.drawio.com/doc/faq/svg-export-text-problems" target="_blank"><text text-anchor="middle" font-size="10px" x="50%" y="100%">Text is not SVG - cannot display</text></a></switch></svg>